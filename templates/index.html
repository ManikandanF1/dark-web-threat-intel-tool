<!DOCTYPE html>
<html>
<head>
    <title>Cyber Threat Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background: #020d1f;
            color: #00fff7;
            font-family: 'Courier New', monospace;
            margin: 0;
        }

        h1 {
            text-align: center;
            padding: 20px;
            text-shadow: 0 0 15px cyan;
            animation: glow 2s infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px cyan; }
            to { text-shadow: 0 0 25px #00fff7; }
        }

        .container {
            display: flex;
            padding: 20px;
        }

        .left {
            width: 70%;
        }

        .right {
            width: 30%;
            padding-left: 20px;
        }

        canvas {
            background: rgba(0,255,255,0.05);
            border: 1px solid cyan;
            padding: 10px;
        }

        .box {
            border: 1px solid cyan;
            margin: 10px 0;
            padding: 20px;
            text-align: center;
            box-shadow: 0 0 10px cyan;
            transition: 0.3s;
        }

        .box:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px cyan;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        td, th {
            border-bottom: 1px solid cyan;
            padding: 10px;
        }

        tr:hover {
            background: rgba(0,255,255,0.1);
        }
    </style>
</head>

<body>

<h1>🛡 CYBER THREAT MONITOR</h1>

<div class="container">

    <div class="left">
        <canvas id="chart"></canvas>

        <table>
            <tr>
                <th>Type</th>
                <th>Value</th>
            </tr>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <div class="right">
        <div class="box" id="alert"></div>
        <div class="box" id="email"></div>
        <div class="box" id="malicious_url"></div>
        <div class="box" id="news"></div>
        <div class="box" id="url"></div>
    </div>

</div>

<script>
let chart;

function loadData() {
    fetch("/api/data")
    .then(res => res.json())
    .then(res => {

        let counts = res.counts;
        let data = res.data;

        // Update Stats
        for (let key in counts) {
            document.getElementById(key).innerHTML =
                `<h2>${counts[key]}</h2><p>${key}</p>`;
        }

        // Update Table
        let table = "";
        data.slice(-20).reverse().forEach(row => {
            table += `<tr><td>${row[0]}</td><td>${row[1]}</td></tr>`;
        });
        document.getElementById("tableBody").innerHTML = table;

        // Chart Data
        let labels = Object.keys(counts);
        let values = Object.values(counts);

        if (chart) chart.destroy();

        chart = new Chart(document.getElementById("chart"), {
            type: "bar",
            data: {
                labels: labels,
                datasets: [{
                    label: "Threat Count",
                    data: values,
                    backgroundColor: [
                        "#00fff7",
                        "#ff00ff",
                        "#ff3c00",
                        "#00ff88",
                        "#8a7cff"
                    ]
                }]
            },
            options: {
                animation: {
                    duration: 1000
                },
                plugins: {
                    legend: {
                        labels: { color: "cyan" }
                    }
                },
                scales: {
                    x: { ticks: { color: "cyan" } },
                    y: { ticks: { color: "cyan" } }
                }
            }
        });
    });
}

// 🔁 AUTO REFRESH EVERY 5 SECONDS
setInterval(loadData, 5000);

// Initial load
loadData();
</script>

</body>
</html>
